<div class="card bg-base-100 w-1/2 mx-auto flex flex-col p-6 rounded-lg shadow-lg">
    <div class="card-title justify-center text-3xl text-primary">Sign Up</div>
    <div class="card-body w-full">
        <form #registerForm="ngForm" class="flex flex-col gap-4 w-full" (ngSubmit)="register()">
            <input name="email" class="input w-full" [(ngModel)]="creds.email" placeholder="Email">
            <input name="displayName" class="input w-full" [(ngModel)]="creds.displayName" placeholder="Display Name">
            <input type="password" name="password" class="input w-full" [(ngModel)]="creds.password"
                placeholder="Password">

            <div class="flex item-center justify-end gap-3">
                <button type="button" class="btn btn-ghost" (click)="cancel()">Cancel</button>
                <button type="submit" class="btn btn-primary">Register</button>
            </div>
        </form>
    </div>
</div>
